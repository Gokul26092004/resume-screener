version: "3.9"

services:

  api:
    build: .
    container_name: resume-api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resume_db
      REDIS_URL: redis://redis:6379

  postgres:
    image: postgres:15
    container_name: resume-postgres
    restart: always
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: resume-redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: resume-celery
    command: celery -A app.worker worker --loglevel=info
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data: